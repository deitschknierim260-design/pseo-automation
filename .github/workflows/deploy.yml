name: pSEO Automation Pipeline

on:
  schedule:
    - cron: '0 2 * * *'
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: 20.x

jobs:
  generate-content:
    name: Generate & Validate Content
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate content
        id: generate
        run: npm run generate
        continue-on-error: false

      - name: Check for rejected files
        id: check-rejected
        run: |
          if [ -d "content-rejected" ] && [ "$(ls -A content-rejected)" ]; then
            echo "rejected_count=$(ls -la content-rejected | wc -l)" >> $GITHUB_OUTPUT
            echo "has_rejected=true" >> $GITHUB_OUTPUT
          else
            echo "has_rejected=false" >> $GITHUB_OUTPUT
          fi

      - name: Build site
        id: build
        run: npm run build

      - name: List generated files
        run: ls -la dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: generated-site
          path: dist/

  commit-and-deploy:
    name: Commit & Deploy
    runs-on: ubuntu-latest
    needs: generate-content
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: generated-site
          path: dist/

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Add and commit changes
        id: commit
        run: |
          git add content/ content-rejected/ dist/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: auto-generate content $(date -u '+%Y-%m-%d %H:%M:%S') [skip ci]"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Push changes
        if: steps.commit.outputs.has_changes == 'true'
        uses: ad-m/github-push-action@master
        with:
          branch: main
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to Vercel
        if: steps.commit.outputs.has_changes == 'true'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'

  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: commit-and-deploy
    if: always()
    steps:
      - name: Send Discord notification
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: |
            **pSEO Pipeline Status**: ${{ needs.commit-and-deploy.result }}
            
            📦 Content Generation: ${{ needs.generate-content.result }}
            🚀 Deployment: ${{ needs.commit-and-deploy.result }}
            
            ℹ️ Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: pSEO Pipeline Report - ${{ needs.commit-and-deploy.result }}
          body: |
            pSEO Automation Pipeline Report
            
            Status: ${{ needs.commit-and-deploy.result }}
            
            Repository: ${{ github.repository }}
            Run ID: ${{ github.run_id }}
            Run URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            Content Generation: ${{ needs.generate-content.result }}
            Deployment: ${{ needs.commit-and-deploy.result }}
            
            Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S')
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: pSEO Automation <${{ secrets.EMAIL_USERNAME }}>

  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    needs: [commit-and-deploy, notify]
    if: always()
    steps:
      - name: Clean up artifacts
        uses: geekyeggo/delete-artifact@v2
        with:
          name: generated-site